# ==========================================
# 1. MYSQL CONFIGURATION (Custom Prefix)
# ==========================================
app.datasource.mysql.url=jdbc:mysql://localhost:3306/guvi_task
app.datasource.mysql.username=root
app.datasource.mysql.password=
app.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# 2. H2 CONFIGURATION (Custom Prefix)
# ==========================================
app.datasource.h2.url=jdbc:h2:mem:analytics_db;DB_CLOSE_DELAY=-1
app.datasource.h2.username=sa
app.datasource.h2.password=
app.datasource.h2.driver-class-name=org.h2.Driver

# General JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 3. MONGODB CONFIGURATION (Standard Prefix)
# ==========================================
spring.data.mongodb.uri=mongodb://localhost:27017/nosql_db